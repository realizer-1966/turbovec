<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>turbovec RAG</title>
<style>
:root{--bg:#0f0f0f;--card:#1a1a2e;--accent:#4361ee;--text:#e0e0e0;--muted:#888;--ok:#4ade80;--err:#f87171;--warn:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
header{background:var(--card);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #333;flex-shrink:0}
header h1{font-size:18px;font-weight:600}
header .badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:8px}
header .status{margin-left:auto;font-size:12px;color:var(--muted)}
header .status.ok{color:var(--ok)}
main{flex:1;overflow-y:auto;padding:16px;max-width:800px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.qbox{background:var(--card);border-radius:12px;padding:16px;flex-shrink:0}
.qbox textarea{width:100%;background:#0a0a0a;color:var(--text);border:1px solid #333;border-radius:8px;padding:12px;font-size:15px;resize:none;outline:none;min-height:60px}
.qbox textarea:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;flex:1}
.btn:active{opacity:.7}
.btn.sec{background:#333}
.btn:disabled{opacity:.4;cursor:default}
.section{background:var(--card);border-radius:12px;padding:14px 16px;flex-shrink:0}
.section .title{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section .title .count{font-size:11px;color:var(--muted);font-weight:400}
.doc-scroll{max-height:120px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.doc-scroll::-webkit-scrollbar{width:4px}
.doc-scroll::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
.doc-scroll::-webkit-scrollbar-track{background:transparent}
.doc{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #222;font-size:13px}
.doc.changed{background:rgba(251,191,36,.12)}
.doc.changed .name{color:var(--warn)}
.doc.added{background:rgba(74,222,128,.12)}
.doc.added .name{color:var(--ok)}
.doc.removed{background:rgba(248,113,113,.12);opacity:.6}
.doc.removed .name{color:var(--err);text-decoration:line-through}
.doc .badge{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:6px}
.doc .badge.changed{background:var(--warn);color:#000}
.doc .badge.added{background:var(--ok);color:#000}
.doc .badge.removed{background:var(--err);color:#fff}
.doc .badge.unchanged{background:#333;color:var(--muted)}
.doc:last-child{border-bottom:none}
.doc .icon{width:20px;text-align:center;color:var(--accent)}
.doc .name{flex:1;word-break:break-all}
.doc .info{color:var(--muted);font-size:11px;white-space:nowrap}
.progress{background:#0a0a0a;border-radius:8px;padding:12px;font-size:13px;min-height:40px;max-height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.progress::-webkit-scrollbar{width:4px}
.progress::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
.progress::-webkit-scrollbar-track{background:transparent}
.progress .bar{height:4px;background:#333;border-radius:2px;margin-top:8px;overflow:hidden}
.progress .bar .fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%}
.progress .line{padding:2px 0;color:#bbb}
.progress .line.active{color:var(--accent)}
.progress .line.done{color:var(--ok)}
.progress .line.err{color:var(--err)}
.msg{padding:12px 16px;border-radius:10px;font-size:14px}
.msg.ok{background:#16201a;color:var(--ok)}
.msg.err{background:#2a1010;color:var(--err)}
.answer{background:var(--card);border-radius:12px;padding:16px;white-space:pre-wrap;font-size:14px;line-height:1.6;max-height:400px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.answer::-webkit-scrollbar{width:4px}
.answer::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
.answer::-webkit-scrollbar-track{background:transparent}
.answer .label{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:8px}
.answer .meta{font-size:12px;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid #333}
.results{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.results::-webkit-scrollbar{width:4px}
.results::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
.results::-webkit-scrollbar-track{background:transparent}
.result{background:#111;border-radius:8px;padding:12px;font-size:13px;line-height:1.5}
.result .hdr{font-size:12px;color:var(--accent);margin-bottom:6px}
.result .score{color:var(--muted);float:right}
.result .txt{color:#bbb;word-break:break-word}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--muted);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <h1>turbovec RAG</h1>
  <span class="badge">4-bit</span>
  <span class="status" id="status">연결 확인 중...</span>
</header>
<main>
  <div class="section">
    <div class="title">문서 <span class="count" id="docCount"></span></div>
    <div class="doc-scroll" id="docList"><span class="spinner"></span>로딩 중...</div>
  </div>

  <div class="qbox">
    <textarea id="q" placeholder="질문을 입력하세요..." autofocus></textarea>
    <div class="btn-row">
      <button class="btn" id="ask" onclick="ask()">질문하기</button>
      <button class="btn sec" id="build" onclick="build()">인덱스 빌드</button>
    </div>
  </div>

  <div id="progressBox" style="display:none">
    <div class="progress" id="progress"></div>
  </div>

  <div id="output"></div>
</main>

<script>
const $=s=>document.querySelector(s);
const out=$('#output');
const progBox=$('#progressBox');
const progDiv=$('#progress');

// Track build button state
let buildInProgress=false;

async function checkStatus(){
  try{
    const r=await fetch('/api/status');
    const d=await r.json();
    const s=$('#status');
    const btn=$('#build');
    if(d.index_loaded){s.textContent=d.n_chunks+' 청크 로드됨';s.classList.add('ok');}
    else{s.textContent='인덱스 없음';s.classList.remove('ok');}

    // Render doc list with change highlighting from status response
    renderDocs(d);

    // Enable build button when:
    //   - no index exists, OR
    //   - index exists but docs (names/sizes/content) changed since last build, OR
    //   - index exists but not loaded
    // Disable only when index loaded AND docs match build-time snapshot
    if(buildInProgress)return; // don't touch button during build
    if(!d.index_exists){
      btn.disabled=false;btn.textContent='인덱스 빌드';
    }else if(!d.index_loaded){
      btn.disabled=false;btn.textContent='인덱스 로드 필요';
    }else{
      // Compare current docs vs build-time docs (name + size + content hash)
      const cur=d.docs||[];
      const idx=d.index_docs||null;
      const removed=d.removed_docs||[];
      let same=false;
      if(idx && cur.length===idx.length && removed.length===0){
        const cm=[...cur].sort((a,b)=>a.name.localeCompare(b.name));
        const im=[...idx].sort((a,b)=>a.name.localeCompare(b.name));
        same=cm.every((v,i)=>v.name===im[i].name&&v.size===im[i].size);
      }
      if(same){
        btn.disabled=true;btn.textContent='빌드 불필요';
      }else{
        // Count changed for button label
        const ch=cur.filter(x=>x.status==='changed').length;
        const ad=cur.filter(x=>x.status==='added').length;
        const rm=removed.length;
        const parts=[];
        if(ch)parts.push(ch+' 변경');
        if(ad)parts.push(ad+' 추가');
        if(rm)parts.push(rm+' 삭제');
        btn.disabled=false;btn.textContent='재빌드 ('+parts.join(' · ')+')';
      }
    }
  }catch(e){$('#status').textContent='서버 오프라인';}
}

function renderDocs(d){
  const el=$('#docList');
  const cur=d.docs||[];
  const removed=d.removed_docs||[];
  const all=cur.concat(removed);
  $('#docCount').textContent='('+all.length+'개 파일)';
  if(all.length===0){el.innerHTML='<span style="color:var(--muted)">rag_docs/ 폴더가 비어있습니다</span>';return;}
  el.innerHTML=all.map(doc=>{
    const ext=doc.name.split('.').pop().toUpperCase();
    const sz=doc.size<1024?doc.size+'B':(doc.size/1024).toFixed(1)+'KB';
    const st=doc.status||'unchanged';
    const badge=st==='unchanged'?'':('<span class="badge '+st+'">'+({changed:'변경',added:'추가',removed:'삭제',unchanged:''})[st]+'</span>');
    return '<div class="doc '+st+'"><span class="icon">'+(ext==='MD'?'📝':'📄')+'</span><span class="name">'+esc(doc.name)+badge+'</span><span class="info">'+sz+'</span></div>';
  }).join('');
}

async function loadDocs(){
  // Docs are now rendered from /api/status in checkStatus().
  // Trigger a status refresh instead.
  await checkStatus();
}

async function build(){
  const btn=$('#build');btn.disabled=true;btn.textContent='빌드 중...';
  buildInProgress=true;
  progBox.style.display='block';
  progDiv.innerHTML='<div class="line active"><span class="spinner"></span>시작 중...</div><div class="bar"><div class="fill" id="barFill"></div></div>';
  const lines=[];
  try{
    const resp=await fetch('/api/build',{method:'POST'});
    const reader=resp.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n');
      buf=parts.pop();
      for(const part of parts){
        const data=part.replace(/^data:\s?/m,'').trim();
        if(!data)continue;
        try{
          const d=JSON.parse(data);
          if(d.success!==undefined){
            // Final result
            if(d.success){
              lines.push('<div class="line done">'+esc(d.message)+'</div>');
              progDiv.innerHTML=lines.join('')+'<div class="bar"><div class="fill" style="width:100%"></div></div>';
              checkStatus();
            }else{
              lines.push('<div class="line err">'+esc(d.message)+'</div>');
              progDiv.innerHTML=lines.join('');
            }
            break;
          }else{
            // Progress message (plain string)
            lines.push('<div class="line">'+esc(data)+'</div>');
            // Update bar based on embedding progress
            const m=data.match(/(\d+)\/(\d+)/);
            if(m){const pct=parseInt(m[1])/parseInt(m[2])*100;$('#barFill')&&($('#barFill').style.width=pct+'%');}
            progDiv.innerHTML=lines.join('')+'<div class="bar"><div class="fill" id="barFill" style="width:'+((m?parseInt(m[1])/parseInt(m[2])*100:0))+'%"></div></div>';
          }
        }catch(e){
          // Plain text progress
          lines.push('<div class="line">'+esc(data)+'</div>');
          progDiv.innerHTML=lines.join('')+'<div class="bar"><div class="fill"></div></div>';
        }
      }
    }
  }catch(e){progDiv.innerHTML='<div class="line err">'+e+'</div>';}
  buildInProgress=false;
  // Re-check status to update build button (disable if no changes)
  checkStatus();
}

async function ask(){
  const q=$('#q').value.trim();
  if(!q)return;
  const btn=$('#ask');btn.disabled=true;
  out.innerHTML='<div class="progress"><span class="spinner"></span>검색 + 답변 생성 중...</div>';
  try{
    const r=await fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    if(!r.ok){const t=await r.text();out.innerHTML='<div class="msg err">'+t+'</div>';return;}
    const d=await r.json();
    let html='<div class="answer"><div class="label">답변</div>'+md(d.answer)+'<div class="meta">검색 '+d.search_time_ms.toFixed(0)+'ms · LLM '+d.llm_time_ms.toFixed(0)+'ms</div></div>';
    html+='<div class="results" style="margin-top:8px">';
    d.results.forEach((r,i)=>{
      html+='<div class="result"><div class="hdr">['+(i+1)+'] '+r.source+' #'+r.chunk_idx+'<span class="score">점수 '+r.score.toFixed(2)+'</span></div><div class="txt">'+esc(r.text.slice(0,300))+(r.text.length>300?'...':'')+'</div></div>';
    });
    html+='</div>';
    out.innerHTML=html;
  }catch(e){out.innerHTML='<div class="msg err">'+e+'</div>';}
  btn.disabled=false;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Minimal markdown renderer: code blocks, bold, italic, headers, lists, links
function md(s){
  s=esc(s);
  // Code blocks ```...```
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>'<pre style="background:#0a0a0a;border:1px solid #333;border-radius:6px;padding:10px;overflow-x:auto;font-size:12px;margin:8px 0"><code>'+code.trim()+'</code></pre>');
  // Inline code `code`
  s=s.replace(/`([^`]+)`/g,'<code style="background:#0a0a0a;padding:2px 5px;border-radius:3px;font-size:13px">$1</code>');
  // Headers ### / ## / #
  s=s.replace(/^###\s+(.+)$/gm,'<h3 style="font-size:14px;font-weight:600;color:var(--accent);margin:10px 0 4px">$1</h3>');
  s=s.replace(/^##\s+(.+)$/gm,'<h2 style="font-size:16px;font-weight:600;color:var(--accent);margin:12px 0 6px">$1</h2>');
  s=s.replace(/^#\s+(.+)$/gm,'<h1 style="font-size:18px;font-weight:700;color:var(--accent);margin:14px 0 8px">$1</h1>');
  // Bold **text**
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  // Italic *text*
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  // Links [text](url)
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" style="color:var(--accent);text-decoration:underline">$1</a>');
  // Unordered list items
  s=s.replace(/^\s*[-*]\s+(.+)$/gm,'<li style="margin-left:18px;list-style:disc">$1</li>');
  // Ordered list items
  s=s.replace(/^\s*\d+\.\s+(.+)$/gm,'<li style="margin-left:18px;list-style:decimal">$1</li>');
  // Line breaks (double newline → paragraph)
  s=s.replace(/\n\n/g,'</p><p style="margin:6px 0">');
  s=s.replace(/\n/g,'<br>');
  return '<p style="margin:6px 0">'+s+'</p>';
}

$('#q').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask();}});
checkStatus();
loadDocs();
</script>
</body>
</html>
